name: Bug report
description: Report a reproducible SteadyAgent workflow, script, or documentation problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What failed, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include commands, host, shell, and relevant output.
      placeholder: |
        powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\tools\validate-release-readiness.ps1
    validations:
      required: true
  - type: dropdown
    id: host
    attributes:
      label: Host
      options:
        - Codex
        - Claude Code
        - Both
        - Other
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation already tried
      description: List the checks you ran and their result.
    validations:
      required: true
