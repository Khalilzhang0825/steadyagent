name: Feature request
description: Suggest a SteadyAgent workflow, host adapter, script, or documentation improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What workflow problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful version.
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: How should this be tested or validated?
    validations:
      required: true
