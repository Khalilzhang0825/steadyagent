name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  release-readiness:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Phase 3 gate
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\tools\validate-phase3.ps1

      - name: Runtime slice gate
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\tools\validate-runtime-slice.ps1

      - name: Release readiness gate
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\tools\validate-release-readiness.ps1
